<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLog | SimpleFlights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .line-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-slate-800/50">
        <div class="flex justify-between items-center p-4 max-w-5xl mx-auto">
            <a href="index.html" class="text-slate-400 hover:text-white transition flex items-center gap-2 text-sm">
                <i class="fa-solid fa-chevron-left"></i> Home
            </a>
            <div class="font-bold tracking-tighter">SimpleFlights <span class="text-blue-400">DevLog</span></div>
            <div class="w-20 text-right"><i class="fa-solid fa-satellite-dish text-emerald-500 animate-pulse text-xs"></i></div>
        </div>
    </nav>

    <header class="max-w-3xl mx-auto px-6 py-16 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight mb-3">Build History</h1>
        <p class="text-slate-400 text-sm italic">This page is synchronized directly with the build logs in the project repository to show an overview of how the app has evolved and grown since its initial release. Follow along to see my progress!</p>
    </header>

    <main class="max-w-4xl mx-auto px-6 pb-32 relative">
        <div class="absolute left-6 md:left-1/2 transform md:-translate-x-1/2 top-0 bottom-0 w-px bg-slate-800"></div>
        <div id="log-target">
            <div class="flex justify-center py-20"><div class="animate-spin h-6 w-6 border-2 border-blue-500 border-t-transparent rounded-full"></div></div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const target = document.getElementById('log-target');
            try {
                // Fetching from parent directory
                const res = await fetch('../buildhistory.md');
                if (!res.ok) throw new Error();
                
                const md = await res.text();
                const sections = md.split('##').filter(s => s.trim());
                let html = '';

                sections.forEach((section, i) => {
                    const lines = section.trim().split('\n');
                    const title = lines[0];
                    const summary = lines.find(l => l.trim().startsWith('*')) || "";
                    const rows = lines.filter(l => l.startsWith('|') && !l.includes('---') && !l.toLowerCase().includes('build'));

                    html += `
                    <div class="relative mb-16">
                        <div class="absolute left-6 md:left-1/2 transform -translate-x-1/2 w-3 h-3 rounded-full ${i===0?'bg-blue-500 line-glow':'bg-slate-700'} border-2 border-slate-900 z-10"></div>
                        <div class="ml-12 md:ml-0 md:w-1/2 ${i%2===0?'md:pr-12 md:text-right':'md:ml-auto md:pl-12'}">
                            <h2 class="text-xl font-bold">${title}</h2>
                            <p class="text-blue-400 text-[11px] mb-4">${summary.replace(/\*/g, '')}</p>
                            <div class="glass rounded-lg overflow-hidden text-left border border-white/5">
                                <div class="overflow-x-auto custom-scrollbar">
                                    <table class="w-full text-[11px]">
                                        <tbody class="divide-y divide-white/5">
                                            ${rows.map(r => {
                                                const c = r.split('|').filter(x => x.trim());
                                                return `<tr>
                                                    <td class="p-2 font-mono text-blue-300 bg-white/[0.02] w-12 text-center border-r border-white/5 font-bold">${c[0].trim()}</td>
                                                    <td class="p-2 text-slate-400">${marked.parseInline(c[1].trim())}</td>
                                                </tr>`;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>`;
                });
                target.innerHTML = html;
            } catch (e) {
                target.innerHTML = `<p class="text-center text-slate-500 py-10">Verify buildhistory.md exists at the root folder.</p>`;
            }
        });
    </script>
</body>
</html>
